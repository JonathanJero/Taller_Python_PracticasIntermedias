{% extends 'base.html' %}

{% block contenido %}

<h1>✏️ Editar Tarea</h1>

<form method="POST" action="/editar/{{ tarea.id }}" style="background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; max-width: 500px;">

    <div style="margin-bottom: 16px;">
        <label for="titulo" style="display: block; font-weight: bold; margin-bottom: 6px;">Título:</label>
        <input
            type="text"
            id="titulo"
            name="titulo"
            value="{{ tarea.titulo }}"
            required
            style="width: 100%; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;"
        >
    </div>

    <div style="margin-bottom: 20px;">
        <label for="descripcion" style="display: block; font-weight: bold; margin-bottom: 6px;">Descripción (opcional):</label>
        <input
            type="text"
            id="descripcion"
            name="descripcion"
            value="{{ tarea.descripcion or '' }}"
            style="width: 100%; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;"
        >
    </div>

    <div style="display: flex; gap: 10px;">
        <button type="submit" style="padding: 10px 24px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold;">
            💾 Guardar cambios
        </button>
        <a href="/" style="padding: 10px 20px; background: #6c757d; color: white; border-radius: 6px; font-size: 15px; text-decoration: none; font-weight: bold;">
            ✕ Cancelar
        </a>
    </div>

</form>

{% endblock %}
