{% extends 'base.html' %}

{% block contenido %}

<h1 style="font-size: 24px; font-weight: 800; color: #2d3748; margin-bottom: 24px;">✏️ Editar Tarea</h1>

<div class="form-card">
    <form method="POST" action="/editar/{{ tarea.id }}">

        <div class="form-group">
            <label class="form-label" for="titulo">Título</label>
            <input class="input-text" type="text" id="titulo" name="titulo"
                   value="{{ tarea.titulo }}" required style="width: 100%;">
        </div>

        <div class="form-group">
            <label class="form-label" for="descripcion">Descripción (opcional)</label>
            <input class="input-text" type="text" id="descripcion" name="descripcion"
                   value="{{ tarea.descripcion or '' }}" style="width: 100%;">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-blue">💾 Guardar cambios</button>
            <a href="/" class="btn btn-gray">✕ Cancelar</a>
        </div>

    </form>
</div>

{% endblock %}
